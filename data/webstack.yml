<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设计师导航</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ===== 顶部导航栏 ===== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(26, 26, 46, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0 16px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px 0;
            max-height: 60vh;
            overflow-y: auto;
        }

        .navbar::-webkit-scrollbar {
            width: 4px;
        }

        .navbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .navbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .nav-list {
            display: flex;
            flex-wrap: wrap;
            list-style: none;
            gap: 2px;
            padding: 8px 0;
        }

        .nav-list>li>a {
            display: block;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-list>li>a:hover,
        .nav-list>li>a.active {
            background: rgba(255, 255, 255, 0.10);
            color: #fff;
        }

        .nav-list>li>a.active {
            background: rgba(99, 102, 241, 0.25);
            color: #818cf8;
        }

        /* ===== 搜索区域 ===== */
        .search-section {
            padding: 20px 16px 16px;
            max-width: 720px;
            margin: 0 auto;
        }

        .search-engines {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            margin-bottom: 10px;
        }

        .search-engines button {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .search-engines button:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }

        .search-engines button.active {
            color: #818cf8;
            background: rgba(99, 102, 241, 0.18);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 0 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.3s;
        }

        .search-box:focus-within {
            border-color: rgba(99, 102, 241, 0.5);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 12px 10px;
            font-size: 15px;
            color: #fff;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .search-box button {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            padding: 8px 6px 8px 12px;
            cursor: pointer;
            font-size: 18px;
            transition: color 0.2s;
        }

        .search-box button:hover {
            color: #818cf8;
        }

        /* ===== 内容区域 ===== */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 16px 30px;
        }

        /* 分组标题 */
        .group-title {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            margin: 20px 0 12px 4px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .group-title i {
            color: #818cf8;
            font-size: 16px;
        }

        .group-title:first-of-type {
            margin-top: 6px;
        }

        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }

        .link-item {
            animation: fadeUp 0.35s ease both;
        }

        .link-item a {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 16px 6px 12px;
            transition: all 0.25s ease;
            border: 1px solid transparent;
            min-height: 90px;
            text-align: center;
            height: 100%;
        }

        .link-item a:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.10);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .link-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.06);
            padding: 4px;
            margin-bottom: 6px;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .link-item a:hover .link-icon {
            transform: scale(1.05);
        }

        .icon-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            font-size: 18px;
            margin-bottom: 6px;
            flex-shrink: 0;
            font-weight: 600;
        }

        .link-text {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.3;
            word-break: break-word;
            max-width: 100%;
        }

        .link-desc {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2px;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            max-width: 100%;
        }

        /* 空状态 */
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 40px 0;
            color: rgba(255, 255, 255, 0.3);
        }

        .empty-state i {
            font-size: 32px;
            display: block;
            margin-bottom: 12px;
        }

        /* ===== 页脚 ===== */
        .footer {
            text-align: center;
            padding: 24px 16px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 10px;
        }

        .footer p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.25);
        }

        .footer a {
            color: rgba(255, 255, 255, 0.35);
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #818cf8;
        }

        /* ===== 动画 ===== */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .navbar {
                padding: 0 8px;
                max-height: 50vh;
            }
            .nav-list>li>a {
                padding: 6px 10px;
                font-size: 12px;
            }
            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 8px;
            }
            .link-item a {
                padding: 12px 4px 10px;
                min-height: 76px;
            }
            .link-icon,
            .icon-placeholder {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
            .link-text {
                font-size: 11px;
            }
            .link-desc {
                display: none;
            }
            .search-section {
                padding: 14px 10px 12px;
            }
            .search-box input {
                font-size: 14px;
                padding: 10px 6px;
            }
            .group-title {
                font-size: 15px;
                margin: 14px 0 8px 2px;
            }
        }

        @media (min-width: 641px) and (max-width: 1024px) {
            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }
    </style>
</head>
