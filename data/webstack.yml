                { title: "所长导航", logo: "", url: "https://liutongxu.github.io/", description: "" },
                { title: "一为webstack", logo: "", url: "https://webstack.iotheme.cn/", description: "" },
                { title: "iplaycode", logo: "", url: "https://iplaycode.github.io/nav/", description: "iplaycode的demo导航网站" }
            ]
        }];

        // ================================================================
        //  2. 渲染引擎
        // ================================================================

        // 获取链接列表（兼容 links / friend / list）
        function getLinksForCategory(cat) {
            if (cat.links) return cat.links;
            if (cat.friend) return cat.friend;
            if (cat.list) {
                // 有 list：展平所有子分组的链接
                const all = [];
                cat.list.forEach(group => {
                    if (group.links) {
                        group.links.forEach(link => {
                            all.push({ ...link, _group: group.term });
                        });
                    }
                });
                return all;
            }
            return [];
        }

        // 判断是否有分组（list）
        function hasGroups(cat) {
            return !!cat.list && Array.isArray(cat.list) && cat.list.length > 0;
        }

        // 获取分组数据
        function getGroups(cat) {
            return cat.list || [];
        }

        // 生成图标 HTML
        function renderIcon(link, defaultIcon) {
            const logo = link.logo || '';
            // 如果有 logo 且不是空字符串，尝试显示图片
            if (logo && logo.trim() !== '') {
                // 如果是 http 或 https 开头，或者以 images/ 开头，认为是图片
                if (logo.match(/^https?:\/\//i) || logo.match(/^images\//i)) {
                    return `<img class="link-icon" src="${logo}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="icon-placeholder" style="display:none;">${link.title.charAt(0).toUpperCase()}</div>`;
                }
                // 否则可能是图标类名？但数据中 logo 基本都是图片路径
                return `<img class="link-icon" src="${logo}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="icon-placeholder" style="display:none;">${link.title.charAt(0).toUpperCase()}</div>`;
            }
            // 没有 logo：使用首字母
            return `<div class="icon-placeholder">${link.title.charAt(0).toUpperCase()}</div>`;
        }

        // 渲染卡片网格（从链接数组）
        function renderCardGrid(links, container) {
            if (!links || links.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i>该分类暂无链接</div>`;
                return;
            }

            let html = '<div class="card-grid">';
            links.forEach((link, index) => {
                const delay = Math.min(index * 0.025, 0.4).toFixed(3);
                const iconHtml = renderIcon(link);
                const descHtml = link.description ?
                    `<div class="link-desc">${link.description}</div>` :
                    '';
                html += `
                    <div class="link-item" style="animation-delay:${delay}s;">
                        <a href="${link.url}" target="_blank" title="${link.description || link.title}">
                            ${iconHtml}
                            <span class="link-text">${link.title}</span>
                            ${descHtml}
                        </a>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // 渲染分类内容（支持分组和普通列表）
        function renderCategory(categoryKey) {
            const container = document.getElementById('mainContainer');
            const cat = NAV_DATA.find(c => c.taxonomy === categoryKey);
            if (!cat) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i>分类 "${categoryKey}" 不存在</div>`;
                return;
            }

            // 情况1：有 list（分组）
            if (hasGroups(cat)) {
                const groups = getGroups(cat);
                let html = '';
                groups.forEach((group, gi) => {
                    const links = group.links || [];
                    if (links.length === 0) return;
                    // 分组标题
                    const termIcon = group.termIcon || 'fa-folder';
                    html += `
                        <div class="group-title">
                            <i class="fas ${termIcon}"></i> ${group.term}
                        </div>
                        <div class="card-grid">
                    `;
                    links.forEach((link, idx) => {
                        const delay = Math.min((gi * 0.1 + idx * 0.025), 0.5).toFixed(3);
                        const iconHtml = renderIcon(link);
                        const descHtml = link.description ?
                            `<div class="link-desc">${link.description}</div>` :
                            '';
                        html += `
                            <div class="link-item" style="animation-delay:${delay}s;">
                                <a href="${link.url}" target="_blank" title="${link.description || link.title}">
                                    ${iconHtml}
                                    <span class="link-text">${link.title}</span>
                                    ${descHtml}
                                </a>
                            </div>
                        `;
                    });
                    html += '</div>';
                });
                container.innerHTML = html || `<div class="empty-state"><i class="fas fa-inbox"></i>该分类暂无链接</div>`;
                return;
            }

            // 情况2：直接有 links 或 friend
            const links = getLinksForCategory(cat);
            renderCardGrid(links, container);
        }

        // ================================================================
        //  3. 导航切换
        // ================================================================

        function buildNav() {
            const navList = document.getElementById('navList');
            let html = '';
            NAV_DATA.forEach((cat, idx) => {
                const active = idx === 0 ? 'active' : '';
                html += `<li><a href="#" class="${active}" data-taxonomy="${cat.taxonomy}">${cat.taxonomy}</a></li>`;
            });
            navList.innerHTML = html;

            // 绑定点击事件
            navList.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const tax = this.dataset.taxonomy;
                    // 更新 active
                    navList.querySelectorAll('a').forEach(a => a.classList.remove('active'));
                    this.classList.add('active');
                    // 渲染
                    renderCategory(tax);
                });
            });
        }

        // ================================================================
        //  4. 搜索引擎切换 & 搜索功能
        // ================================================================

        function setupSearch() {
            const engineBtns = document.querySelectorAll('#searchEngines button');
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            let currentEngine = 'Google';

            engineBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    engineBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentEngine = this.textContent.trim();
                    searchInput.placeholder = `${currentEngine} 搜索...`;
                });
            });

            function doSearch() {
                const query = searchInput.value.trim();
                if (!query) return;
                let url = '';
                const q = encodeURIComponent(query);
                switch (currentEngine) {
                    case 'Google':
                        url = `https://www.google.com/search?q=${q}`;
                        break;
                    case '百度':
                        url = `https://www.baidu.com/s?wd=${q}`;
                        break;
                    case 'Bing':
                        url = `https://www.bing.com/search?q=${q}`;
                        break;
                    case 'GitHub':
                        url = `https://github.com/search?q=${q}`;
                        break;
                    default:
                        url = `https://www.google.com/search?q=${q}`;
                }
                window.open(url, '_blank');
            }

            searchBtn.addEventListener('click', doSearch);
            searchInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') doSearch();
            });
        }

        // ================================================================
        //  5. 初始化
        // ================================================================

        function init() {
            buildNav();
            // 默认渲染第一个分类
            if (NAV_DATA.length > 0) {
                renderCategory(NAV_DATA[0].taxonomy);
            }
            setupSearch();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>

